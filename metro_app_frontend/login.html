<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — 地铁智行</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #1a73e8, #0d47a1); min-height: 100vh;
  display: flex; align-items: center; justify-content: center; }
.card { background: white; border-radius: 16px; padding: 2.5rem 2rem; width: 360px;
  max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.card h1 { text-align: center; margin-bottom: 0.3rem; color: #1a73e8; }
.card .sub { text-align: center; color: #999; font-size: 0.85rem; margin-bottom: 2rem; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 4px; }
.form-group input { width: 100%; padding: 0.7rem; border: 1px solid #ddd;
  border-radius: 8px; font-size: 1rem; outline: none; }
.form-group input:focus { border-color: #1a73e8; }
.btn { width: 100%; padding: 0.75rem; border: none; border-radius: 8px;
  font-size: 1rem; cursor: pointer; margin-bottom: 0.6rem; }
.btn-primary { background: #1a73e8; color: white; }
.btn-primary:hover { background: #1557b0; }
.btn-secondary { background: #fff; color: #1a73e8; border: 1px solid #1a73e8; }
.msg { text-align: center; font-size: 0.85rem; margin-top: 0.5rem; display: none;
  padding: 0.5rem; border-radius: 6px; }
.msg.show { display: block; }
.msg.success { background: #e6f4ea; color: #0f9d58; }
.msg.error { background: #fce8e6; color: #d93025; }
.tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #eee; }
.tab { flex: 1; text-align: center; padding: 0.6rem; cursor: pointer;
  color: #999; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 600; }
.back-link { text-align: center; margin-top: 1rem; }
.back-link a { color: #1a73e8; text-decoration: none; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="card">
  <h1>地铁智行</h1>
  <p class="sub">登录后可收藏路线和站点</p>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">登录</div>
    <div class="tab" onclick="switchTab('register')">注册</div>
  </div>
  <div id="loginForm">
    <div class="form-group">
      <label>手机号</label>
      <input type="text" id="lPhone" placeholder="11位手机号" maxlength="11">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="lPassword" placeholder="输入密码">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">登录</button>
  </div>
  <div id="registerForm" style="display:none">
    <div class="form-group">
      <label>手机号</label>
      <input type="text" id="rPhone" placeholder="11位手机号" maxlength="11">
    </div>
    <div class="form-group">
      <label>密码（至少6位）</label>
      <input type="password" id="rPassword" placeholder="至少6位">
    </div>
    <button class="btn btn-primary" onclick="doRegister()">注册</button>
  </div>
  <div class="msg" id="msg"></div>
  <div class="back-link"><a href="/">← 返回首页</a></div>
</div>
<script>
const API = window.location.origin;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  if (tab === 'login') document.querySelector('.tab:first-child').classList.add('active');
  else document.querySelector('.tab:last-child').classList.add('active');
  document.getElementById('msg').classList.remove('show');
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text; m.className = 'msg show ' + type;
}

async function doLogin() {
  const phone = document.getElementById('lPhone').value.trim();
  const pw = document.getElementById('lPassword').value;
  if (phone.length !== 11) { showMsg('请输入正确的11位手机号', 'error'); return; }
  if (!pw) { showMsg('请输入密码', 'error'); return; }
  try {
    const resp = await fetch(API + '/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone, password: pw})
    });
    const data = await resp.json();
    if (!resp.ok) { showMsg(data.detail || '登录失败', 'error'); return; }
    localStorage.setItem('metro_token', data.token);
    localStorage.setItem('metro_phone', phone);
    showMsg('登录成功，正在跳转...', 'success');
    setTimeout(() => { window.location.href = '/'; }, 800);
  } catch(e) { showMsg('服务器连接失败', 'error'); }
}

async function doRegister() {
  const phone = document.getElementById('rPhone').value.trim();
  const pw = document.getElementById('rPassword').value;
  if (phone.length !== 11) { showMsg('请输入正确的11位手机号', 'error'); return; }
  if (pw.length < 6) { showMsg('密码至少6位', 'error'); return; }
  try {
    const resp = await fetch(API + '/api/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone, password: pw, nickname: phone})
    });
    const data = await resp.json();
    if (!resp.ok) { showMsg(data.detail || '注册失败', 'error'); return; }
    showMsg('注册成功，请切换到登录页登录', 'success');
  } catch(e) { showMsg('服务器连接失败', 'error'); }
}
</script>
</body>
</html>
